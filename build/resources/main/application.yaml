server:
  servlet:
    context-path: /v1/siga-services/certificacion
spring:
  application:
    name: areausuaria
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@//10.5.115.190:1521/desamef19c
    username: CENTROCOSTO_APP
    password: CENTROCOSTO_APP
    hikari:
      auto-commit: false
      connectionTimeout: 20000
      idleTimeout: 300000
      maxLifetime: 900000
      minimumIdle: 5
      maximumPoolSize: 30
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        cache:
          '[use_query_cache]': false
        temp:
          use-jdbc-metadata-defaults: false
        '[format_sql]': true
        '[use_sql_comments]': true
        type: trace                        # <-- Muestra parámetros con tipo real

logging:
  level:
    '[org.hibernate.SQL]': debug           # <-- imprime SQL formateado
    '[org.hibernate.orm.jdbc.bind]': trace # <-- imprime parámetros
